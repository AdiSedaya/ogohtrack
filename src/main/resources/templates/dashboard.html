<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>OgohTrack</title>

<!-- Icon website -->
<link rel="icon" type="image/png" href="/ogohtrack.png">

<style>

/* Background halaman */

body{
margin:0;
font-family:Arial;
color:white;
background:url('/background.jpg') no-repeat center center fixed;
background-size:cover;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 40px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

border-bottom:1px solid rgba(255,255,255,0.2);
}

/* Logo aplikasi */

.logo{
font-size:20px;
font-weight:bold;
}

/* SEARCH BAR */

.search-container{
display:flex;
justify-content:center;
margin-top:20px;
}

.search-box{
display:flex;
align-items:center;
width:420px;
background:white;
border-radius:30px;
padding:10px 18px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.search-icon{
font-size:16px;
margin-right:10px;
color:#666;
}

.search-input{
border:none;
outline:none;
width:100%;
font-size:15px;
background:transparent;
color:#333;
}

/* USER NAVIGATION */

.nav-right{
display:flex;
align-items:center;
gap:15px;
}

.user-profile{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
background:rgba(255,255,255,0.25);
padding:6px 14px;
border-radius:20px;
color:white;
font-size:14px;
}

.user-icon{
width:22px;
height:22px;
}

/* Tombol logout */

.logout-btn{
background:#ff4d4d;
color:white;
padding:8px 16px;
border-radius:20px;
text-decoration:none;
transition:0.2s;
}

.logout-btn:hover{
background:#dc2626;
transform:scale(1.05);
}

/* SECTION TITLE */

.section-title{
margin-left:20px;
margin-top:30px;
font-size:22px;
font-weight:bold;
}

/* CONTAINER CARD OGOH-OGOH */

.card-container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

/* CARD OGOH-OGOH */

.card{
width:200px;
position:relative;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);

border-radius:15px;
overflow:hidden;

transition:0.3s;
text-decoration:none;
color:white;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Gambar ogoh-ogoh */

.card img{
width:100%;
height:220px;
object-fit:cover;
}

/* Informasi ogoh-ogoh */

.card-info{
padding:12px;
background:rgba(0,0,0,0.45);
color:white;
font-size:14px;
}

.card-info .title{
font-size:16px;
font-weight:bold;
margin-bottom:5px;
}

.card-info .meta{
font-size:13px;
opacity:0.9;
}

/* Tombol edit dan delete (admin) */

.card-actions{
position:absolute;
top:10px;
right:10px;
display:none;
gap:8px;
}

.card:hover .card-actions{
display:flex;
}

.edit-btn{
background:#3b82f6;
color:white;
padding:4px 7px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.delete-btn{
background:#ef4444;
color:white;
padding:4px 7px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

/* FLOATING BUTTON TAMBAH DATA */

.fab{
position:fixed;

bottom:35px;
right:35px;

width:65px;
height:65px;

border-radius:50%;

background:linear-gradient(135deg,#3b82f6,#2563eb);

display:flex;
align-items:center;
justify-content:center;

font-size:32px;
color:white;
text-decoration:none;

box-shadow:0 10px 25px rgba(0,0,0,0.6);

transition:0.3s;
}

.fab:hover{
transform:scale(1.15) rotate(90deg);
}

</style>
</head>

<body>


<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
OgohTrack
</div>

<!-- FORM PENCARIAN OGOH-OGOH -->

<form action="/search" method="get" class="search-container">

<div class="search-box">

<span class="search-icon">🔍</span>

<input
type="text"
name="keyword"
placeholder="Cari ogoh-ogoh atau STT..."
class="search-input"
>

</div>

</form>

<!-- MENU USER -->

<div class="nav-right">

<a href="/profile" class="user-profile">

<img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png"
class="user-icon">

<span th:text="${user != null ? user.nama : role}"></span>
</a>

<a href="/logout" class="logout-btn">
Logout
</a>

</div>

</div>


<!-- SECTION TRENDING OGOH-OGOH -->

<h2 class="section-title">🔥 Trending Sekarang</h2>

<div class="card-container">

<div th:each="project : ${trendingProjects}" class="card">

<a th:href="@{/ogoh-ogoh/{slug}(slug=${project.slug})}">

<img th:src="@{'/uploads/' + ${project.gambar}}">

<div class="card-info">

<div class="title" th:text="${project.namaProyek}"></div>

<div th:text="${project.namaStt}"></div>

<div>
Ketua: <span th:text="${project.ketuaStt}"></span>
</div>

</div>

</a>

<!-- Tombol edit dan delete untuk admin -->

<div class="card-actions" th:if="${role != null and role == 'ADMIN'}">

<a th:href="@{/edit/{id}(id=${project.id})}" class="edit-btn">✏</a>

<a th:href="@{/delete/{id}(id=${project.id})}" class="delete-btn">🗑</a>

</div>

</div>

</div>


<!-- SECTION OGOH-OGOH TAHUN SEBELUMNYA -->

<h2 class="section-title">📅 Last Year</h2>

<div class="card-container">

<div th:each="project : ${lastYearProjects}" class="card">

<a th:href="@{/ogoh-ogoh/{slug}(slug=${project.slug})}">

<img th:src="@{'/uploads/' + ${project.gambar}}">

<div class="card-info">

<div class="title" th:text="${project.namaProyek}"></div>

<div th:text="${project.namaStt}"></div>

<div>
Ketua: <span th:text="${project.ketuaStt}"></span>
</div>

</div>

</a>

<div class="card-actions" th:if="${role != null and role == 'ADMIN'}">

<a th:href="@{/edit/{id}(id=${project.id})}" class="edit-btn">✏</a>

<a th:href="@{/delete/{id}(id=${project.id})}" class="delete-btn">🗑</a>

</div>

</div>

</div>

<!-- FLOATING BUTTON TAMBAH DATA (ADMIN) -->

<a th:if="${role != null and role == 'ADMIN'}"
href="/add"
class="fab">+</a>


</body>
</html>
