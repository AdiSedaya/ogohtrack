<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<!-- Judul halaman -->
<title>OgohTrack</title>

<!-- Icon website -->
<link rel="icon" type="image/png" href="/ogohtrack.png">

<style>

/* Background halaman login */

body{
margin:0;
padding:0;
font-family: Arial, Helvetica, sans-serif;

background:url('background.jpg');
background-size:cover;
background-position:center;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

/* Box login */

.login-box{

width:350px;
padding:40px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);

border-radius:15px;

text-align:center;
color:white;
}

/* Judul login */

.login-box h2{
margin-bottom:30px;
}

/* Container input */

.input-box{
margin-bottom:20px;
}

/* Input username dan password */

.input-box input{

width:100%;
padding:10px;

border:none;
border-radius:8px;
outline:none;

}

/* Tombol login */

button{

width:100%;
padding:10px;

border:none;
border-radius:20px;

background:#2e6cf6;
color:white;
font-size:16px;

cursor:pointer;
}

button:hover{
background:#1f4fd1;
}

/* Pesan error login */

.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<!-- Container login -->

<div class="login-box">

<h2>Login OgohTrack</h2>

<!-- Form login -->

<form action="/login" method="post">

<div class="input-box">
<input type="text" name="username" placeholder="Username">
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password">
</div>

<button type="submit">Login</button>

</form>

<!-- Pesan error jika login gagal -->

<p class="error" th:text="${error}"></p>

</div>

</body>
</html>
